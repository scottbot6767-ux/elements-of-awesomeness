<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elements of Awesomeness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #08070A;
  --bg2:       #0E0C14;
  --parchment: #1A1620;
  --border:    #2A2535;
  --text:      #C8C0D4;
  --muted:     #6B6278;
  --gold:      #C8A84B;
  --gold-dim:  #7A6428;
  --silver:    #A8B4C0;
  --copper:    #B87040;

  --earth: #7A5C28;
  --earth-acc: #D4A040;
  --earth-glow: rgba(212,160,64,0.25);

  --fire: #8B2510;
  --fire-acc: #E05020;
  --fire-glow: rgba(224,80,32,0.25);

  --air: #2A4A6C;
  --air-acc: #6090C0;
  --air-glow: rgba(96,144,192,0.25);

  --water: #164438;
  --water-acc: #40A880;
  --water-glow: rgba(64,168,128,0.25);

  --awesome-col: #A06030;
  --epic-col:    #8090A0;
  --legendary-col: #C0A030;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Raleway', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* NOISE OVERLAY */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.6;
}

/* ALCHEMICAL SYMBOLS */
.sym {
  font-size: 2.5rem;
  line-height: 1;
  display: inline-block;
}

/* HEADER */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,7,10,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.site-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.1rem;
  color: var(--gold);
  letter-spacing: 0.1em;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  cursor: pointer;
}

.site-title .title-sym {
  font-size: 1.4rem;
  opacity: 0.8;
}

.global-progress {
  display: flex;
  align-items: center;
  gap: 1rem;
  font-size: 0.8rem;
  color: var(--muted);
  font-family: 'Raleway', sans-serif;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.global-xp-bar {
  width: 140px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.global-xp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  transition: width 0.6s ease;
  border-radius: 2px;
}

/* HERO */
.hero {
  padding: 5rem 2rem 4rem;
  text-align: center;
  position: relative;
}

.hero-symbol-ring {
  display: flex;
  justify-content: center;
  gap: 3rem;
  margin-bottom: 3rem;
}

.hero-element {
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.6rem;
  transition: transform 0.3s ease;
  text-decoration: none;
  color: inherit;
}

.hero-element:hover { transform: translateY(-6px); }

.element-symbol-wrap {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid;
  position: relative;
  transition: box-shadow 0.3s ease;
}

.hero-element[data-el="earth"] .element-symbol-wrap {
  border-color: var(--earth-acc);
  background: rgba(122,92,40,0.15);
}
.hero-element[data-el="earth"]:hover .element-symbol-wrap {
  box-shadow: 0 0 30px var(--earth-glow);
}

.hero-element[data-el="fire"] .element-symbol-wrap {
  border-color: var(--fire-acc);
  background: rgba(139,37,16,0.15);
}
.hero-element[data-el="fire"]:hover .element-symbol-wrap {
  box-shadow: 0 0 30px var(--fire-glow);
}

.hero-element[data-el="air"] .element-symbol-wrap {
  border-color: var(--air-acc);
  background: rgba(42,74,108,0.15);
}
.hero-element[data-el="air"]:hover .element-symbol-wrap {
  box-shadow: 0 0 30px var(--air-glow);
}

.hero-element[data-el="water"] .element-symbol-wrap {
  border-color: var(--water-acc);
  background: rgba(22,68,56,0.15);
}
.hero-element[data-el="water"]:hover .element-symbol-wrap {
  box-shadow: 0 0 30px var(--water-glow);
}

.element-symbol-wrap svg {
  width: 44px;
  height: 44px;
}

.el-label {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}

.el-pillar-name {
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
}

.hero-element[data-el="earth"] .el-pillar-name { color: var(--earth-acc); }
.hero-element[data-el="fire"]  .el-pillar-name { color: var(--fire-acc);  }
.hero-element[data-el="air"]   .el-pillar-name { color: var(--air-acc);   }
.hero-element[data-el="water"] .el-pillar-name { color: var(--water-acc); }

.hero-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.06em;
  line-height: 1.1;
  margin-bottom: 1rem;
}

.hero-subtitle {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 1.1rem;
  color: var(--muted);
  letter-spacing: 0.04em;
  margin-bottom: 3rem;
}

.hero-divider {
  width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  margin: 0 auto 3rem;
}

/* PILLAR GRID */
.pillar-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.5rem;
  padding: 0 2rem 4rem;
  max-width: 1400px;
  margin: 0 auto;
}

.pillar-card {
  border-radius: 4px;
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  background: var(--parchment);
}

.pillar-card:hover {
  transform: translateY(-4px);
}

.pillar-card[data-el="earth"]:hover { border-color: var(--earth-acc); box-shadow: 0 8px 32px var(--earth-glow); }
.pillar-card[data-el="fire"]:hover  { border-color: var(--fire-acc);  box-shadow: 0 8px 32px var(--fire-glow);  }
.pillar-card[data-el="air"]:hover   { border-color: var(--air-acc);   box-shadow: 0 8px 32px var(--air-glow);   }
.pillar-card[data-el="water"]:hover { border-color: var(--water-acc); box-shadow: 0 8px 32px var(--water-glow); }

.pillar-card-top {
  padding: 2rem 1.5rem 1.5rem;
  position: relative;
}

.pillar-card-top::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.06;
}

.pillar-card[data-el="earth"] .pillar-card-top::before { background: var(--earth-acc); }
.pillar-card[data-el="fire"]  .pillar-card-top::before { background: var(--fire-acc); }
.pillar-card[data-el="air"]   .pillar-card-top::before { background: var(--air-acc); }
.pillar-card[data-el="water"] .pillar-card-top::before { background: var(--water-acc); }

.pillar-sym-large {
  width: 56px;
  height: 56px;
  margin-bottom: 1rem;
}

.pillar-card[data-el="earth"] .pillar-sym-large path { stroke: var(--earth-acc); }
.pillar-card[data-el="fire"]  .pillar-sym-large path { stroke: var(--fire-acc);  }
.pillar-card[data-el="air"]   .pillar-sym-large path { stroke: var(--air-acc);   }
.pillar-card[data-el="water"] .pillar-sym-large path { stroke: var(--water-acc); }

.pillar-card-name {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1.1rem;
  letter-spacing: 0.1em;
  margin-bottom: 0.2rem;
}

.pillar-card[data-el="earth"] .pillar-card-name { color: var(--earth-acc); }
.pillar-card[data-el="fire"]  .pillar-card-name { color: var(--fire-acc);  }
.pillar-card[data-el="air"]   .pillar-card-name { color: var(--air-acc);   }
.pillar-card[data-el="water"] .pillar-card-name { color: var(--water-acc); }

.pillar-element-tag {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1.5rem;
}

.pillar-card-progress {
  padding: 1rem 1.5rem 1.2rem;
  border-top: 1px solid var(--border);
}

.prog-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 0.5rem;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.prog-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 0.8rem;
}

.prog-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}

.pillar-card[data-el="earth"] .prog-fill { background: linear-gradient(90deg, var(--earth), var(--earth-acc)); }
.pillar-card[data-el="fire"]  .prog-fill { background: linear-gradient(90deg, var(--fire), var(--fire-acc)); }
.pillar-card[data-el="air"]   .prog-fill { background: linear-gradient(90deg, var(--air), var(--air-acc)); }
.pillar-card[data-el="water"] .prog-fill { background: linear-gradient(90deg, var(--water), var(--water-acc)); }

.pin-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.pin-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border);
  border: 1px solid var(--border);
  transition: all 0.3s ease;
}

.pin-dot.earned-awesome { background: var(--awesome-col); border-color: var(--awesome-col); }
.pin-dot.earned-epic    { background: var(--epic-col);    border-color: var(--epic-col); }
.pin-dot.earned-legendary { background: var(--legendary-col); border-color: var(--legendary-col); box-shadow: 0 0 6px var(--legendary-col); }

/* ===== VIEWS ===== */
#view-home, #view-pillar, #view-principle {
  display: none;
}
#view-home.active, #view-pillar.active, #view-principle.active {
  display: block;
}

/* ===== PILLAR VIEW ===== */
.pillar-view-header {
  padding: 3rem 2rem 2rem;
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 2rem;
}

.pillar-view-sym {
  width: 72px;
  height: 72px;
  flex-shrink: 0;
}

.pillar-view-meta {
  flex: 1;
}

.pillar-view-element {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.4rem;
}

.pillar-view-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  line-height: 1;
}

.pillar-view-progress {
  text-align: right;
  font-size: 0.75rem;
  color: var(--muted);
}

.pillar-view-progress strong {
  display: block;
  font-family: 'Cinzel', serif;
  font-size: 1.8rem;
  font-weight: 400;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.4rem 1rem;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: none;
  color: var(--muted);
  font-family: 'Raleway', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  margin: 1rem 2rem 0;
}

.back-btn:hover { color: var(--text); border-color: var(--text); }

.principle-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
  padding: 0 2rem 4rem;
  max-width: 1200px;
  margin: 0 auto;
}

.principle-tile {
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--parchment);
  padding: 1.5rem;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
}

.principle-tile:hover {
  transform: translateY(-3px);
}

.principle-tile[data-el="earth"]:hover { border-color: var(--earth-acc); box-shadow: 0 6px 24px var(--earth-glow); }
.principle-tile[data-el="fire"]:hover  { border-color: var(--fire-acc);  box-shadow: 0 6px 24px var(--fire-glow); }
.principle-tile[data-el="air"]:hover   { border-color: var(--air-acc);   box-shadow: 0 6px 24px var(--air-glow); }
.principle-tile[data-el="water"]:hover { border-color: var(--water-acc); box-shadow: 0 6px 24px var(--water-glow); }

.principle-num {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 0.4rem;
}

.principle-tile-name {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  margin-bottom: 1rem;
}

.principle-tile[data-el="earth"] .principle-tile-name { color: var(--earth-acc); }
.principle-tile[data-el="fire"]  .principle-tile-name { color: var(--fire-acc); }
.principle-tile[data-el="air"]   .principle-tile-name { color: var(--air-acc); }
.principle-tile[data-el="water"] .principle-tile-name { color: var(--water-acc); }

.tile-badge-row {
  display: flex;
  gap: 0.4rem;
  align-items: center;
}

.tier-badge {
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.2rem 0.5rem;
  border-radius: 2px;
  border: 1px solid;
  font-family: 'Raleway', sans-serif;
  opacity: 0.4;
  transition: opacity 0.3s;
}

.tier-badge.earned { opacity: 1; }

.tier-badge.awesome  { color: var(--awesome-col);   border-color: var(--awesome-col); }
.tier-badge.epic     { color: var(--epic-col);       border-color: var(--epic-col); }
.tier-badge.legendary { color: var(--legendary-col); border-color: var(--legendary-col); }
.tier-badge.legendary.earned { box-shadow: 0 0 8px rgba(192,160,48,0.4); }

.tile-role-model {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 0.8rem;
  font-style: italic;
  font-family: 'IM Fell English', serif;
}

/* ===== PRINCIPLE VIEW ===== */
.principle-view {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 2rem 6rem;
}

.principle-hero {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 2rem;
  align-items: start;
  margin-bottom: 2.5rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--border);
}

.principle-number {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

.principle-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 700;
  letter-spacing: 0.05em;
  line-height: 1;
  margin-bottom: 1.5rem;
}

.principle-quote-block {
  border-left: 2px solid;
  padding-left: 1.2rem;
  margin-bottom: 1.5rem;
}

.principle-quote-block p {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--text);
  margin-bottom: 0.4rem;
}

.principle-quote-block cite {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
}

.principle-meta-row {
  display: flex;
  gap: 1.5rem;
  font-size: 0.75rem;
  flex-wrap: wrap;
}

.meta-item {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.meta-label {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}

.meta-value {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 0.9rem;
  color: var(--text);
}

.principle-fact-box {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1rem 1.2rem;
  text-align: center;
  min-width: 200px;
  align-self: flex-start;
}

.fact-label {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.6rem;
}

.fact-text {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 0.8rem;
  line-height: 1.5;
  color: var(--silver);
}

.role-model-name {
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  letter-spacing: 0.06em;
  margin-top: 0.8rem;
  color: var(--muted);
}

/* TIER SECTIONS */
.tier-section {
  margin-bottom: 2rem;
}

.tier-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.2rem;
  padding-bottom: 0.8rem;
  border-bottom: 1px solid var(--border);
}

.tier-icon {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid;
  font-size: 0.75rem;
  flex-shrink: 0;
}

.tier-icon.awesome  { border-color: var(--awesome-col);   color: var(--awesome-col);   background: rgba(160,96,48,0.1); }
.tier-icon.epic     { border-color: var(--epic-col);       color: var(--epic-col);       background: rgba(128,144,160,0.1); }
.tier-icon.legendary { border-color: var(--legendary-col); color: var(--legendary-col); background: rgba(192,160,48,0.1); }

.tier-title {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.tier-title.awesome  { color: var(--awesome-col); }
.tier-title.epic     { color: var(--epic-col); }
.tier-title.legendary { color: var(--legendary-col); }

.tier-subtitle {
  font-size: 0.7rem;
  color: var(--muted);
  margin-left: auto;
  font-style: italic;
  font-family: 'IM Fell English', serif;
}

.tier-completed-badge {
  padding: 0.2rem 0.6rem;
  border-radius: 2px;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-family: 'Cinzel', serif;
  display: none;
}

.tier-completed-badge.show { display: inline; }
.tier-completed-badge.awesome   { background: rgba(160,96,48,0.2);   color: var(--awesome-col);   border: 1px solid var(--awesome-col); }
.tier-completed-badge.epic      { background: rgba(128,144,160,0.2); color: var(--epic-col);       border: 1px solid var(--epic-col); }
.tier-completed-badge.legendary { background: rgba(192,160,48,0.2); color: var(--legendary-col); border: 1px solid var(--legendary-col); box-shadow: 0 0 10px rgba(192,160,48,0.3); }

.req-list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.req-item {
  display: flex;
  align-items: flex-start;
  gap: 0.8rem;
  padding: 0.7rem 0.9rem;
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s ease;
  background: rgba(255,255,255,0.01);
  position: relative;
}

.req-item:hover {
  background: rgba(255,255,255,0.03);
  border-color: var(--muted);
}

.req-item.checked {
  background: rgba(255,255,255,0.02);
}

.req-item.checked.awesome-req   { border-color: rgba(160,96,48,0.4); }
.req-item.checked.epic-req      { border-color: rgba(128,144,160,0.4); }
.req-item.checked.legendary-req { border-color: rgba(192,160,48,0.4); }

.req-checkbox {
  width: 18px;
  height: 18px;
  border: 1px solid var(--border);
  border-radius: 2px;
  flex-shrink: 0;
  margin-top: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.req-item.checked .req-checkbox {
  background: var(--gold-dim);
  border-color: var(--gold);
}

.req-item.checked .req-checkbox::after {
  content: '';
  width: 5px;
  height: 9px;
  border-right: 2px solid var(--gold);
  border-bottom: 2px solid var(--gold);
  transform: rotate(45deg) translate(-1px, -1px);
  display: block;
}

.req-text {
  font-size: 0.85rem;
  line-height: 1.5;
  color: var(--text);
  transition: color 0.2s;
}

.req-item.checked .req-text {
  color: var(--muted);
  text-decoration: line-through;
  text-decoration-color: rgba(255,255,255,0.15);
}

.epic-counter {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: var(--muted);
  padding: 0.5rem 0;
}

/* ===== MEDAL BANNER ===== */
.medal-banner {
  display: none;
  background: linear-gradient(135deg, rgba(192,160,48,0.1), rgba(192,160,48,0.05));
  border: 1px solid var(--legendary-col);
  border-radius: 4px;
  padding: 1.5rem;
  text-align: center;
  margin-bottom: 2rem;
}

.medal-banner.show { display: block; animation: medalGlow 2s ease-in-out infinite alternate; }

@keyframes medalGlow {
  from { box-shadow: 0 0 20px rgba(192,160,48,0.2); }
  to   { box-shadow: 0 0 40px rgba(192,160,48,0.4); }
}

.medal-banner h3 {
  font-family: 'Cinzel Decorative', serif;
  color: var(--legendary-col);
  font-size: 1.2rem;
  letter-spacing: 0.1em;
  margin-bottom: 0.4rem;
}

.medal-banner p {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 0.85rem;
  color: var(--muted);
}

/* ===== SUGGESTED ===== */
.suggested-row {
  display: flex;
  gap: 1rem;
  margin-top: 2rem;
}

.suggested-box {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1rem;
}

.sug-label {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

.sug-val {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 0.85rem;
  color: var(--silver);
}

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.anim-in {
  animation: fadeInUp 0.4s ease forwards;
}

.stagger-1 { animation-delay: 0.05s; }
.stagger-2 { animation-delay: 0.1s; }
.stagger-3 { animation-delay: 0.15s; }
.stagger-4 { animation-delay: 0.2s; }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .pillar-grid { grid-template-columns: repeat(2, 1fr); }
  .principle-grid { grid-template-columns: repeat(2, 1fr); }
  .hero-symbol-ring { gap: 1.5rem; }
}

@media (max-width: 600px) {
  .pillar-grid { grid-template-columns: 1fr; }
  .principle-grid { grid-template-columns: 1fr; }
  .hero-symbol-ring { gap: 1rem; }
  .element-symbol-wrap { width: 60px; height: 60px; }
  .site-header { padding: 0.8rem 1rem; }
  .pillar-view-header { padding: 2rem 1rem 1.5rem; flex-direction: column; }
  .principle-hero { grid-template-columns: 1fr; }
  .principle-fact-box { min-width: 0; }
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(120%);
  background: var(--parchment);
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  padding: 0.8rem 1.5rem;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  color: var(--gold);
  z-index: 999;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
  pointer-events: none;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}

// ============================================================
// STATE
// ============================================================
const KEY = 'eoa-tracker-v1';
let state = {};

function loadState() {
  try { state = JSON.parse(localStorage.getItem(KEY)) || {}; } catch { state = {}; }
}

function saveState() {
  localStorage.setItem(KEY, JSON.stringify(state));
}

function toggleReq(pillarId, principleId, tier, idx) {
  const k = `${pillarId}.${principleId}.${tier}.${idx}`;
  state[k] = !state[k];
  saveState();
  renderPrincipleView(currentPillarId, currentPrincipleId);
  updateGlobalProgress();
}

function isChecked(pillarId, principleId, tier, idx) {
  return !!state[`${pillarId}.${principleId}.${tier}.${idx}`];
}

// ============================================================
// PROGRESS CALC
// ============================================================
function getPrincipleProgress(pillarId, principle) {
  const awesomeTotal = principle.awesome.length;
  const awesomeDone = principle.awesome.filter((_, i) => isChecked(pillarId, principle.id, 'awesome', i)).length;
  const epicDone = principle.epic.filter((_, i) => isChecked(pillarId, principle.id, 'epic', i)).length;
  const legendaryDone = isChecked(pillarId, principle.id, 'legendary', 0) ? 1 : 0;

  const awesomeComplete = awesomeDone >= awesomeTotal;
  const epicComplete = epicDone >= 3;
  const legendaryComplete = legendaryDone >= 1;

  return { awesomeDone, awesomeTotal, epicDone, legendaryDone, awesomeComplete, epicComplete, legendaryComplete };
}

function getPillarProgress(pillar) {
  let totalChecks = 0, doneChecks = 0;
  for (const p of pillar.principles) {
    const prog = getPrincipleProgress(pillar.id, p);
    totalChecks += p.awesome.length + 3 + 1; // awesome + 3 epic needed + 1 legendary
    doneChecks += prog.awesomeDone + Math.min(prog.epicDone, 3) + prog.legendaryDone;
  }
  return { totalChecks, doneChecks, pct: totalChecks ? Math.round(doneChecks / totalChecks * 100) : 0 };
}

function updateGlobalProgress() {
  let total = 0, done = 0;
  for (const pillar of PILLARS) {
    const pp = getPillarProgress(pillar);
    total += pp.totalChecks;
    done += pp.doneChecks;
  }
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('global-xp-fill').style.width = pct + '%';
  document.getElementById('global-pct-text').textContent = pct + '%';
  document.getElementById('global-checks-text').textContent = done + ' / ' + total;
}

// ============================================================
// VIEWS
// ============================================================
let currentPillarId = null, currentPrincipleId = null;

function showHome() {
  document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.remove('active'));
  document.getElementById('view-home').classList.add('active');
  renderHome();
  window.scrollTo(0, 0);
}

function showPillar(pillarId) {
  currentPillarId = pillarId;
  document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.remove('active'));
  document.getElementById('view-pillar').classList.add('active');
  renderPillarView(pillarId);
  window.scrollTo(0, 0);
}

function showPrinciple(pillarId, principleId) {
  currentPillarId = pillarId;
  currentPrincipleId = principleId;
  document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.remove('active'));
  document.getElementById('view-principle').classList.add('active');
  document.getElementById('principle-back-btn').onclick = () => showPillar(pillarId);
  renderPrincipleView(pillarId, principleId);
  window.scrollTo(0, 0);
}

// ============================================================
// RENDER HOME
// ============================================================
function elSym(el) {
  const svgs = {
    earth: `<polygon points="30,50 5,12 55,12" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="18" y1="32" x2="42" y2="32" stroke="currentColor" stroke-width="1.5"/>`,
    fire:  `<polygon points="30,10 55,48 5,48" stroke="currentColor" stroke-width="1.5" fill="none"/>`,
    air:   `<polygon points="30,10 55,48 5,48" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="18" y1="28" x2="42" y2="28" stroke="currentColor" stroke-width="1.5"/>`,
    water: `<polygon points="30,50 5,12 55,12" stroke="currentColor" stroke-width="1.5" fill="none"/>`
  };
  return svgs[el] || '';
}

function pillarEl(pillar) {
  return pillar.element.toLowerCase();
}

function renderHome() {
  const grid = document.getElementById('pillar-grid');
  grid.innerHTML = '';
  for (const pillar of PILLARS) {
    const el = pillarEl(pillar);
    const pp = getPillarProgress(pillar);
    const pins = pillar.principles.map((p, i) => {
      const prog = getPrincipleProgress(pillar.id, p);
      let cls = '';
      if (prog.legendaryComplete) cls = 'earned-legendary';
      else if (prog.epicComplete) cls = 'earned-epic';
      else if (prog.awesomeComplete) cls = 'earned-awesome';
      return `<div class="pin-dot ${cls}" title="${p.name}"></div>`;
    }).join('');

    grid.innerHTML += `
    <div class="pillar-card" data-el="${el}" onclick="showPillar('${pillar.id}')">
      <div class="pillar-card-top">
        <svg class="pillar-sym-large" viewBox="0 0 60 60" fill="none">
          ${pillar.symSvg}
        </svg>
        <div class="pillar-card-name">${pillar.name}</div>
        <div class="pillar-element-tag">Element of ${pillar.element}</div>
      </div>
      <div class="pillar-card-progress">
        <div class="prog-label">
          <span>Progress</span>
          <span>${pp.pct}%</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pp.pct}%"></div></div>
        <div class="pin-row">${pins}</div>
      </div>
    </div>`;
  }
}

// ============================================================
// RENDER PILLAR
// ============================================================
function renderPillarView(pillarId) {
  const pillar = PILLARS.find(p => p.id === pillarId);
  if (!pillar) return;
  const el = pillarEl(pillar);
  const pp = getPillarProgress(pillar);

  document.getElementById('pillar-view-header').innerHTML = `
    <svg class="pillar-view-sym" viewBox="0 0 60 60" fill="none" style="color:${pillar.color}">
      ${pillar.symSvg}
    </svg>
    <div class="pillar-view-meta">
      <div class="pillar-view-element">Element of ${pillar.element}</div>
      <div class="pillar-view-title" style="color:${pillar.color}">${pillar.name} Awesomeness</div>
    </div>
    <div class="pillar-view-progress">
      <strong style="color:${pillar.color}">${pp.pct}%</strong>
      <span style="font-size:0.7rem;color:var(--muted)">${pp.doneChecks} / ${pp.totalChecks} pts</span>
    </div>
  `;

  const grid = document.getElementById('principle-grid');
  grid.innerHTML = '';
  for (const p of pillar.principles) {
    const prog = getPrincipleProgress(pillarId, p);
    grid.innerHTML += `
    <div class="principle-tile" data-el="${el}" onclick="showPrinciple('${pillarId}','${p.id}')">
      <div class="principle-num">Principle ${p.num} of 9</div>
      <div class="principle-tile-name">${p.name}</div>
      <div class="tile-badge-row">
        <span class="tier-badge awesome ${prog.awesomeComplete ? 'earned' : ''}">Awesome</span>
        <span class="tier-badge epic ${prog.epicComplete ? 'earned' : ''}">Epic</span>
        <span class="tier-badge legendary ${prog.legendaryComplete ? 'earned' : ''}">Legendary</span>
      </div>
      <div class="tile-role-model">${p.roleModel}</div>
    </div>`;
  }
}

// ============================================================
// RENDER PRINCIPLE
// ============================================================
function renderPrincipleView(pillarId, principleId) {
  const pillar = PILLARS.find(p => p.id === pillarId);
  const principle = pillar?.principles.find(p => p.id === principleId);
  if (!pillar || !principle) return;

  const el = pillarEl(pillar);
  const prog = getPrincipleProgress(pillarId, principle);
  const col = pillar.color;

  // Awesome reqs
  const awesomeItems = principle.awesome.map((req, i) => {
    const checked = isChecked(pillarId, principleId, 'awesome', i);
    return `<div class="req-item awesome-req ${checked ? 'checked' : ''}" onclick="toggleReq('${pillarId}','${principleId}','awesome',${i})">
      <div class="req-checkbox"></div>
      <div class="req-text">${req}</div>
    </div>`;
  }).join('');

  const epicDone = principle.epic.filter((_, i) => isChecked(pillarId, principleId, 'epic', i)).length;
  const epicItems = principle.epic.map((req, i) => {
    const checked = isChecked(pillarId, principleId, 'epic', i);
    return `<div class="req-item epic-req ${checked ? 'checked' : ''}" onclick="toggleReq('${pillarId}','${principleId}','epic',${i})">

    </div>`;

  const legChecked = isChecked(pillarId, principleId, 'legendary', 0);

  const view = document.getElementById('principle-view');
  view.innerHTML = `
    <div class="principle-hero anim-in">
      <div>

          </div>

            <span class="meta-label">Spirit Animal</span>

          </div>
          <div class="meta-item">
            <span class="meta-label">Element</span>
            <span class="meta-value">${pillar.element}</span>
          </div>
        </div>
      </div>
      <div class="principle-fact-box">
        <div class="fact-label">Did You Know?</div>
        <div class="fact-text">${principle.fact}</div>
      </div>
    </div>

    <!-- TIER: AWESOME -->
    <div class="tier-section anim-in stagger-1">
      <div class="tier-header">
        <div class="tier-icon awesome">I</div>
        <div class="tier-title awesome">Awesome</div>
        <div class="tier-subtitle">Complete all ${principle.awesome.length} requirements</div>
        <span class="tier-completed-badge awesome ${prog.awesomeComplete ? 'show' : ''}">Earned</span>
      </div>
      <div class="req-list">${awesomeItems}</div>
    </div>

    <!-- TIER: EPIC -->
    <div class="tier-section anim-in stagger-2">
      <div class="tier-header">
        <div class="tier-icon epic">II</div>
        <div class="tier-title epic">Epic</div>
        <div class="tier-subtitle">Complete any 3 of ${principle.epic.length}</div>
        <span class="tier-completed-badge epic ${prog.epicComplete ? 'show' : ''}">Earned</span>
      </div>
      <div class="epic-counter" style="color:${col}">
        ${Math.min(epicDone,3)} / 3 selected &mdash; ${epicDone} total checked
      </div>
      <div class="req-list">${epicItems}</div>
    </div>

    <!-- TIER: LEGENDARY -->
    <div class="tier-section anim-in stagger-3">
      <div class="tier-header">
        <div class="tier-icon legendary">III</div>
        <div class="tier-title legendary">Legendary</div>
        <div class="tier-subtitle">Complete a Legendary Project</div>
        <span class="tier-completed-badge legendary ${prog.legendaryComplete ? 'show' : ''}">Earned</span>
      </div>
      <div class="req-list">
        <div class="req-item legendary-req ${legChecked ? 'checked' : ''}" onclick="toggleReq('${pillarId}','${principleId}','legendary',0)">
          <div class="req-checkbox"></div>
          <div class="req-text">Complete an approved Legendary Project related to ${principle.name}. Work with your Sponsor to write a proposal; then document what you did in a 500–1,000 word summary. Must have Awesome and Epic completed first.</div>

    <div class="suggested-row anim-in stagger-4">

  checkAndToast(prog);
  updateGlobalProgress();
  updatePillarCardsIfVisible();

// ============================================================
// TOAST
// ============================================================
let toastTimer = null;
let lastToastKey = '';

function checkAndToast(prog) {
  if (prog.legendaryComplete && lastToastKey !== 'legendary') {
    lastToastKey = 'legendary';
    showToast('Legendary Achievement Unlocked');
  } else if (prog.epicComplete && lastToastKey !== 'epic' && !prog.legendaryComplete) {
    lastToastKey = 'epic';
    showToast('Epic Achievement Unlocked');
  } else if (prog.awesomeComplete && lastToastKey !== 'awesome' && !prog.epicComplete) {
    lastToastKey = 'awesome';
    showToast('Awesome Achievement Unlocked');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function updatePillarCardsIfVisible() {
  if (document.getElementById('view-home').classList.contains('active')) renderHome();
  if (document.getElementById('view-pillar').classList.contains('active')) renderPillarView(currentPillarId);
}

// ============================================================
// INIT
// ============================================================
loadState();
showHome();
updateGlobalProgress();
